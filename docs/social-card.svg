      <circle cx="342" cy="39" r="7" fill="#59e0c1"/>
      <text x="360" y="45" fill="#b8ffed" font-family="Arial, sans-serif" font-size="15" font-weight="700">SESJA TRWA</text>
      <text x="28" y="145" fill="#8fa7bb" font-family="Arial, sans-serif" font-size="16">02:47:18 · stawka 46,00 zł/h</text>
