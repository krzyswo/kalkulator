    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#59e0c1"/><stop offset="1" stop-color="#57a8ff"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#000" flood-opacity=".38"/></filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1080" cy="70" r="240" fill="#57a8ff" opacity=".12"/>
