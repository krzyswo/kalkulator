<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="520" viewBox="0 0 1400 520" role="img" aria-labelledby="title desc">
  <title id="title">Kalkulator Zarobków</title>
  <desc id="desc">Ilustracja ciemnego panelu licznika zarobków z aktywnym czasem pracy, kwotą i historią sesji.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
